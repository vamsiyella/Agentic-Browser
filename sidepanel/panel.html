<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agent</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="top">
    <b>Agentic Browser</b>
    <span id="status">idle</span>
  </div>

  <div id="usage">·</div>

  <label>Server</label>
  <input id="serverUrl" type="text" value="http://localhost:3000" spellcheck="false">

  <label>Task</label>
  <textarea id="task" rows="3" placeholder="Go to google.com and search for mechanical keyboards under $100"></textarea>

  <div id="btns">
    <button id="startBtn">▶ Start</button>
    <button id="stopBtn" disabled>■ Stop</button>
  </div>

  <!-- Shown when the agent uses ask_user to pause and ask a clarifying
       question (e.g. "is a layover okay, or nonstop only?"). Hidden the
       rest of the time. -->
  <div id="clarify" class="hidden">
    <div id="clarifyQuestion"></div>
    <div id="clarifyRow">
      <input id="clarifyInput" type="text" placeholder="Type your answer..." spellcheck="false">
      <button id="clarifySubmit">Answer</button>
    </div>
  </div>

  <div id="log"></div>

  <script src="panel.js"></script>
</body>
</html>
